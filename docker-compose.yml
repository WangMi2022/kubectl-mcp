version: '3.8'

services:
  kubectl-mcp:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kubectl-mcp-server
    image: kubectl-mcp:latest
    
    # 端口映射
    ports:
      - "8080:8080"
    
    # 环境变量配置
    environment:
      # 服务器配置
      - KUBECTL_MCP_HOST=0.0.0.0
      - KUBECTL_MCP_PORT=8080
      
      # Kubeconfig 配置
      - KUBECONFIG=/app/kubeconfig/config
      - KUBECTL_MCP_KUBECONFIGPATH=/app/kubeconfig/config
      
      # 日志配置
      - KUBECTL_MCP_LOGLEVEL=info
      - KUBECTL_MCP_LOGFORMAT=json
      - KUBECTL_MCP_LOGFILE=/app/logs/kubectl-mcp.log
      
      # 性能配置
      - KUBECTL_MCP_MAXCONCURRENTREQUESTS=100
      - KUBECTL_MCP_REQUESTTIMEOUT=30s
      
      # 安全配置（可选）
      # - KUBECTL_MCP_APITOKEN=your-api-token-here
      
      # 缓存配置
      - KUBECTL_MCP_ENABLECACHE=true
      - KUBECTL_MCP_CACHETTL=5m
    
    # Volume 挂载
    volumes:
      # 挂载 kubeconfig 文件（只读）
      - ${HOME}/.kube/config:/app/kubeconfig/config:ro
      
      # 挂载日志目录
      - ./logs:/app/logs
      
      # 挂载配置文件（可选）
      # - ./config/config.yaml:/app/config/config.yaml:ro
    
    # 资源限制
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
    
    # 重启策略
    restart: unless-stopped
    
    # 健康检查
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3
    
    # 网络配置
    networks:
      - kubectl-mcp-network

networks:
  kubectl-mcp-network:
    driver: bridge
